name: Jekyll CI

# This is a Jekyll site (github-pages gem), not a Node project. The right CI here
# builds the site and proofs the generated HTML using the tooling already pinned
# in the Gemfile / Gemfile.lock.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & proof site
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      JEKYLL_ENV: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true # runs bundle install and caches gems

      # Bundler 4's `bundle exec <gem-exe>` doesn't resolve gem executables
      # here, so generate binstubs and invoke those instead.
      - name: Generate binstubs
        run: bundle binstubs jekyll html-proofer --force

      - name: Build site
        run: bundle exec bin/jekyll build

      # node_modules holds the vendored reveal.js library (served at
      # /node_modules/... in production); ignore its own test HTML so the
      # proofer checks the actual site, not the library's fixtures.
      - name: Proof HTML (internal links only)
        run: bundle exec bin/htmlproofer ./_site --disable-external --ignore-files "/node_modules/"
